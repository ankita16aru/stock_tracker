name: Stock Tracker

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '30 17 * * 1-5'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - run: pip install yfinance pandas

      - run: python tracker.py